worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 0;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;

    # Cloudflare Flexible 모드: origin에 HTTP로 오면서 X-Forwarded-Proto: https를 보냄
    # 이미 HTTPS면 리다이렉트 불필요 (무한루프 방지)
    map $http_x_forwarded_proto $redirect_to_https {
        "https" 0;
        default 1;
    }

    # HTTP 서버
    server {
        listen 80;
        server_name _;

        resolver 127.0.0.11 valid=10s;

        # X-Forwarded-Proto가 없거나 http면 HTTPS로 리다이렉트
        # Cloudflare Flexible에서 https로 오면 리다이렉트 안 함
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }

        location / {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # MinIO presigned URL proxy (Cloudflare Flexible: 브라우저 HTTPS → CF → nginx HTTP → MinIO)
        # proxy_pass에 URI suffix를 붙이면 nginx가 경로를 정규화해서 presigned URL 서명 검증 실패
        # $request_uri 사용으로 원본 URI(인코딩 포함) 그대로 전달
        location /3dgs-platform/ {
            set $upstream_minio http://minio:9000;
            proxy_pass $upstream_minio$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            client_max_body_size 0;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        resolver 127.0.0.11 valid=10s;

        ssl_certificate /etc/nginx/certs/cloudflare-origin.crt;
        ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Frontend (Next.js)
        location / {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js HMR WebSocket (개발 시)
        location /_next/webpack-hmr {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Swagger 내부 전용 (외부 도메인 차단)
        location /api/docs {
            if ($host ~* "splat\.wiki") {
                return 403;
            }
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
        }

        location /api/openapi.json {
            if ($host ~* "splat\.wiki") {
                return 403;
            }
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
        }

        # Auth API (Rate Limit 강화)
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            set $upstream_backend http://backend:8000;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO presigned URL proxy (브라우저 → HTTPS → nginx → MinIO)
        # proxy_pass에 URI suffix를 붙이면 nginx가 경로를 정규화해서 presigned URL 서명 검증 실패
        # $request_uri 사용으로 원본 URI(인코딩 포함) 그대로 전달
        location /3dgs-platform/ {
            set $upstream_minio http://minio:9000;
            proxy_pass $upstream_minio$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            client_max_body_size 0;
        }

        # Backend WebSocket
        location /api/ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
